.header-slash {

.section-link {

}

.hamburger-btn {

}
@media (max-width: 900px) {
  .site-nav {
    display: none !important;
    flex-direction: column !important;
    gap: 1rem !important;
    position: absolute !important;
    top: 100%;

}
.footer-policy-link {

}
.footer-policy-link a {

  letter-spacing: 0.15em;
  color: #999;
  text-decoration: none;
}
.footer-policy-link a:hover { color: #4ABD9B; }

.cart-fab {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 500;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
}
.cart-fab.visible { display: flex; }
.cart-fab-circle {
  display: flex; align-items: center; justify-content: center;
  position: relative;
  background: transparent;
  border-radius: 0;
}
.cart-fab-circle svg { width: 24px; height: 24px; fill: none; stroke: #fff; stroke-width: 2; }
.cart-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: #111;
  color: #fff;
  font-size: 0.65rem;
  font-family: 'menco', monospace;
  letter-spacing: 0;
  border-radius: 50%;
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
}
.cart-widget {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 500;
  width: 300px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 1.25rem;
  display: none;
  flex-direction: column;
  gap: 0.75rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.cart-widget.open { display: flex; }
@media (max-width: 900px) {
  .cart-widget { bottom: 2rem; right: 1rem; left: 1rem; width: auto; }
}
.cart-header { display: flex; justify-content: space-between; align-items: center; }
.cart-title { font-family: 'menco', monospace; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.15em; }
.cart-close { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #888; padding: 0; letter-spacing: 0; line-height: 1; }
.cart-close:hover { color: #111; }
.cart-items { display: flex; flex-direction: column; gap: 0; }
.cart-item { display: grid; grid-template-columns: 44px 1fr auto; gap: 0.6rem; padding: 0.75rem 0; border-top: 1px solid #eee; align-items: start; }
.cart-item-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 4px; background: #f5f5f5; }
.cart-item-info { display: flex; flex-direction: column; gap: 0.25rem; }
.cart-item-name { font-family: 'menco', monospace; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; line-height: 1.3; }
.cart-item-price { font-family: 'menco', monospace; font-size: 0.75rem; color: #888; letter-spacing: 0.05em; }
.cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }
.cart-item-remove { background: none; border: none; cursor: pointer; font-size: 0.85rem; color: #bbb; padding: 0; letter-spacing: 0; }
.cart-item-remove:hover { color: #111; }
.cart-mini-stepper { display: flex; align-items: center; gap: 0.4rem; font-family: 'menco', monospace; font-size: 0.8rem; letter-spacing: 0.05em; }
.cart-mini-btn { background: none; border: none; cursor: pointer; font-size: 0.85rem; color: #888; padding: 0; letter-spacing: 0; line-height: 1; }
.cart-mini-btn:hover { color: #111; }
.cart-subtotal { display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 0.75rem; font-family: 'menco', monospace; font-size: 0.85rem; letter-spacing: 0.1em; }
.cart-subtotal-label { color: #888; }
.cart-subtotal-amount { font-weight: 500; }
.btn-order { width: 100%; padding: 0.75rem; border-radius: 999px; border: none; background: #4ABD9B; color: #fff; font-family: 'menco', monospace; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.2em; cursor: pointer; }
.btn-order:hover { background: #3aad8b; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'menco', monospace;
  font-size: 1rem;
  letter-spacing: 0.2em;
  background: #fff;
  color: #111;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
img { display: block; }
main { flex: 1; }

/* ── shop grid ── */
.shop-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5rem 3rem;
  padding: 4rem 3rem;
  max-width: 1920px;
  margin: 0 auto;
}
@media (max-width: 900px) {
  .shop-gallery { grid-template-columns: 1fr; padding: 2rem 1.5rem; gap: 4rem; }
}
@media (min-width: 900px) and (max-width: 1200px) {
  .shop-gallery { grid-template-columns: repeat(2, 1fr); }
}
.card { text-decoration: none; color: #111; display: flex; justify-content: center; }
.card-inner { display: inline-flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }
.card-thumb {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
  background: transparent;
}
.card-thumb img {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
  object-fit: contain;
  transition: opacity 0.1s ease;
  opacity: 1;
}
.slide-hidden { opacity: 0; }
.card-meta { margin-top: 1rem; text-align: center; width: 100%; overflow-wrap: break-word; word-break: break-word; }
.card-title { font-size: 1rem; font-weight: 500; line-height: 1.8; letter-spacing: 0.2em; }
.card-price { font-size: 0.9rem; color: #555; margin-top: 0.3rem; font-weight: 300; letter-spacing: 0.1em; }
.card:hover .card-title, .card:hover .card-price { color: #4ABD9B; }
.card-sold-out .card-title, .card-sold-out .card-price { color: #bbb; }
.card-sold-out .card-thumb img { opacity: 0.4; }

/* ── product detail ── */
.product-wrap {
  display: grid;
  grid-template-columns: 50% 30% 20%;
  gap: 0;
  max-width: 1920px;
  margin: 0 auto;
  align-items: start;
  height: calc(100vh - 80px);
  overflow: hidden;
}
@media (min-width: 900px) and (max-width: 1300px) {
  .product-wrap {
    grid-template-columns: 50% 40% 10%;
  }
}
@media (max-width: 900px) {
  .product-wrap {
    grid-template-columns: 1fr;
    height: auto;
    overflow: visible;
    padding: 0 0 4rem;
  }
}
.product-images {
  overflow-y: scroll;
  height: 100%;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 3rem 2rem 3rem 3rem;
}
.product-images::-webkit-scrollbar { display: none; }
.product-images img {
  width: 100%;
  height: auto;
  margin-bottom: 1rem;
  display: block;
}
/* mobile: only first image shown inline, rest hidden (shown below info) */
@media (max-width: 900px) {
  .product-images { display: none; }
}
.product-img-main-mobile {
  display: none;
}
@media (max-width: 900px) {
  .product-img-main-mobile {
    display: block;
    width: 100%;
    height: auto;
    padding: 1.5rem 1.5rem 0;
  }
}
.product-imgs-rest-mobile {
  display: none;
}
@media (max-width: 900px) {
  .product-imgs-rest-mobile {
    display: block;
    padding: 1rem 1.5rem 0;
  }
  .product-imgs-rest-mobile img {
    width: 100%;
    height: auto;
    margin-bottom: 1rem;
    display: block;
  }
}
.product-info {
  overflow-y: scroll;
  height: 100%;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 3rem 3rem 3rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.product-info::-webkit-scrollbar { display: none; }
@media (max-width: 900px) {
  .product-info {
    height: auto;
    overflow: visible;
    padding: 1.5rem;
  }
}
.product-name {
  font-size: 1.3rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  line-height: 1.4;
}
.product-price {
  font-size: 1.4rem;
  font-weight: 300;
  letter-spacing: 0.1em;
}
.price-currency {
  font-family: 'Pretendard', sans-serif;
  font-weight: 200;
  font-size: 65%;
}
.price-amount {
  font-family: 'menco', monospace;
  font-weight: 400;
}
.product-note {
  font-size: 0.9rem;
  color: #4ABD9B;
  letter-spacing: 0.1em;
  font-family: 'Pretendard', sans-serif;
  font-weight: 400;
}
.product-desc {
  font-size: 0.95rem;
  font-weight: 300;
  line-height: 1.8;
  letter-spacing: 0.05em;
}
.product-desc p { margin-bottom: 1rem; }
.lang-kr {
  font-family: 'Pretendard', sans-serif !important;
  font-size: 0.9em;
  font-weight: 300;
  margin-top: 1rem;
  line-height: 1.8;
}

/* qty stepper */
.qty-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.qty-stepper {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 1rem;
  letter-spacing: 0.1em;
}
.qty-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid #4ABD9B;
  background: #4ABD9B;
  color: #fff;
  font-size: 1.1rem;
  line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
  letter-spacing: 0;
}
.qty-btn:hover { background: #3aad8b; border-color: #3aad8b; }
.qty-num { font-size: 1rem; min-width: 1.5rem; text-align: center; letter-spacing: 0.1em; }

/* add to cart btn */
.btn-cart {
  width: 100%;
  padding: 1rem;
  border-radius: 999px;
  border: none;
  background: #4ABD9B;
  color: #fff;
  font-family: 'menco', monospace;
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-cart:hover { background: #3aad8b; }
.btn-cart:disabled {
  background: #ccc;
  cursor: not-allowed;
}


/* ── order page ── */
.order-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
}
.order-title {
  font-size: 1.5rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  margin-bottom: 1rem;
}
.order-rule { border: none; border-top: 1px solid #111; margin-bottom: 2.5rem; }
.order-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: start;
}
@media (max-width: 900px) {
  .order-grid { grid-template-columns: 1fr; gap: 2.5rem; }
}

/* form */
.form-section-title {
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  margin-bottom: 0.25rem;
}
.form-section-sub {
  font-size: 0.8rem;
  color: #888;
  letter-spacing: 0.1em;
  font-family: 'Pretendard', sans-serif;
  margin-bottom: 1.5rem;
}
.form-group { margin-bottom: 1.25rem; }
.form-label {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  margin-bottom: 0.4rem;
  font-family: 'Pretendard', sans-serif;
  font-weight: 500;
}
.form-label-note {
  font-size: 0.75rem;
  color: #888;
  font-weight: 400;
  letter-spacing: 0.05em;
}
.form-input {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ccc;
  padding: 0.5rem 0;
  font-family: 'menco', monospace;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  background: transparent;
  outline: none;
  color: #111;
  border-radius: 0;
}
.form-input:focus { border-bottom-color: #111; }
.form-input.error { border-bottom-color: #e05; }
.form-input::placeholder { color: #bbb; font-size: 0.85rem; letter-spacing: 0.05em; }

/* order summary */
.order-summary { display: flex; flex-direction: column; gap: 1.5rem; }
.summary-items { display: flex; flex-direction: column; gap: 0.5rem; }
.summary-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
}
.summary-row.bold { font-weight: 500; }
.summary-rule { border: none; border-top: 1px solid #ddd; margin: 0.25rem 0; }
.summary-shipping-note { font-size: 0.75rem; color: #aaa; letter-spacing: 0.05em; font-family: 'Pretendard', sans-serif; }

/* checkboxes */
.check-list { display: flex; flex-direction: column; gap: 0.75rem; }
.check-item { display: flex; align-items: flex-start; gap: 0.75rem; }
.check-item input[type=checkbox] { margin-top: 0.15rem; flex-shrink: 0; accent-color: #4ABD9B; }
.check-item label {
  font-size: 0.8rem;
  color: #555;
  letter-spacing: 0.05em;
  line-height: 1.6;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
}

/* place order btn */
.btn-place-order {
  width: 100%;
  padding: 1rem;
  border-radius: 999px;
  border: none;
  background: #4ABD9B;
  color: #fff;
  font-family: 'menco', monospace;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  cursor: pointer;
  margin-top: 1rem;
  transition: background 0.2s, opacity 0.2s;
}
.btn-place-order:hover:not(:disabled) { background: #3aad8b; }
.btn-place-order:disabled { opacity: 0.45; cursor: not-allowed; }

/* error message */
.form-error-msg {
  display: none;
  font-size: 0.8rem;
  color: #e05;
  letter-spacing: 0.05em;
  font-family: 'Pretendard', sans-serif;
  margin-top: 0.3rem;
}
.form-error-msg.visible { display: block; }

/* ── confirmation page ── */
.confirm-wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 5rem 2rem;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.confirm-title {
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  font-family: 'Pretendard', sans-serif;
  margin-bottom: 0.5rem;
}
.confirm-order-num {
  font-size: 0.9rem;
  letter-spacing: 0.15em;
  color: #888;
  margin-bottom: 2rem;
}
.confirm-order-num span { color: #4ABD9B; font-weight: 500; }
.confirm-rule { border: none; border-top: 1px solid #ddd; margin: 0 0 1.5rem; }
.confirm-items { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; text-align: left; }
.confirm-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
}
.confirm-row.bold { font-weight: 500; }
.confirm-account-block {
  text-align: left;
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid #ddd;
}
.confirm-account-label {
  font-size: 0.8rem;
  color: #888;
  letter-spacing: 0.1em;
  font-family: 'Pretendard', sans-serif;
  margin-bottom: 0.5rem;
}
.confirm-account-num {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 1.15rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  margin-bottom: 1rem;
}
.copy-btn {
  background: none; border: none; cursor: pointer; padding: 0; color: #aaa;
}
.copy-btn:hover { color: #4ABD9B; }
.copy-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.confirm-notes {
  font-size: 0.82rem;
  color: #888;
  letter-spacing: 0.05em;
  line-height: 1.8;
  font-family: 'Pretendard', sans-serif;
  text-align: left;
}

.fixed-top { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; }
#main-content { padding-top: 80px; }
</style>
<style>

  transform: translate(-50%, -50%);

  pointer-events: none;
}
.cart-fab-circle {
  position: relative;

}
.fab-bg-img {
  width: 100%;

  display: block;
  pointer-events: none;

.qty-btn-symbol {

<div class="fixed-top" id="fixed-top">
  <div class="site-header">
  <div class="site-logo"><a href="home.html" class="logo-link">BOYOUNG</a> <span class="header-slash">/</span> <a href="shop.html" class="section-link">shop</a></div>
  <nav class="site-nav" id="site-nav"><a href="projects.html" class="">projects</a><a href="info.html" class="">info</a></nav>

<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzmWruBlompUg07YvMFlVZ-hkq9j8UDpQcwaNRU4crcjl9z0IV5ahQc3iRwiy2pzluYg/exec';

function getCart() {
  try { return JSON.parse(localStorage.getItem('moc_cart') || '[]'); }
  catch(e) { return []; }
}
function cartSubtotal(cart) {
  return cart.reduce(function(s,i) { return s + i.price * i.qty; }, 0);
}

var FREE_THRESHOLD = 50000;
var SHIPPING = 4000;
var REMOTE_SURCHARGE = 3000;

function calcShipping(sub, cart) {
  if (cart.length === 0) return 0;
  if (sub >= FREE_THRESHOLD) return 0;
  var remote = document.getElementById('f-remote').checked;
  return SHIPPING + (remote ? REMOTE_SURCHARGE : 0);
}

function renderSummary() {
  var cart = getCart();
  var el = document.getElementById('summary-items');
  el.innerHTML = '';
  cart.forEach(function(item) {
    var row = document.createElement('div');
    row.className = 'summary-row';
    // editable qty
    row.innerHTML =
      '<span>' + item.name + ' &times; ' +
        '<button class="cart-mini-btn" data-slug="' + item.slug + '" data-action="minus" style="margin:0 0.3rem">−</button>' +
        '<span id="ord-qty-' + item.slug + '">' + item.qty + '</span>' +
        '<button class="cart-mini-btn" data-slug="' + item.slug + '" data-action="plus" style="margin:0 0.3rem">+</button>' +
        '<button class="cart-item-remove" data-slug="' + item.slug + '" style="margin-left:0.5rem;font-size:0.8rem;color:#bbb;background:none;border:none;cursor:pointer">×</button>' +
      '</span>' +
      '<span>₩ ' + (item.price * item.qty).toLocaleString() + '</span>';
    el.appendChild(row);
  });

  var sub = cartSubtotal(cart);
  var ship = calcShipping(sub, cart);
  document.getElementById('s-subtotal').textContent = '₩ ' + sub.toLocaleString();
  document.getElementById('s-shipping').textContent = '₩ ' + ship.toLocaleString();
  document.getElementById('s-total').textContent = '₩ ' + (sub + ship).toLocaleString();

  // wire up mini controls
  el.querySelectorAll('.cart-mini-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var c = getCart();
      var idx = c.findIndex(function(i) { return i.slug === btn.dataset.slug; });
      if (idx === -1) return;
      if (btn.dataset.action === 'plus') { c[idx].qty++; }
      else { c[idx].qty--; if (c[idx].qty <= 0) c.splice(idx, 1); }
      localStorage.setItem('moc_cart', JSON.stringify(c));
      renderSummary();
    });
  });
  el.querySelectorAll('.cart-item-remove').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var c = getCart().filter(function(i) { return i.slug !== btn.dataset.slug; });
      localStorage.setItem('moc_cart', JSON.stringify(c));
      renderSummary();
    });
  });

  checkReady();
}

function checkReady() {
  var name  = document.getElementById('f-name').value.trim();
  var email = document.getElementById('f-email').value.trim();
  var phone = document.getElementById('f-phone').value.trim();
  var addr  = document.getElementById('f-addr1').value.trim();
  var chk1  = document.getElementById('chk1').checked;
  var chk2  = document.getElementById('chk2').checked;
  var chk3  = document.getElementById('chk3').checked;
  var cart  = getCart();
  var ready = name && email && phone && addr && chk1 && chk2 && chk3 && cart.length > 0;
  document.getElementById('btn-place-order').disabled = !ready;
}

['f-name','f-email','f-phone','f-addr1'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', checkReady);
});
['chk1','chk2','chk3'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', checkReady);
});
document.getElementById('f-remote').addEventListener('change', renderSummary);

function openKakaoAddr() {
  new daum.Postcode({
    oncomplete: function(data) {
      document.getElementById('f-addr1').value = data.roadAddress || data.jibunAddress;
      document.getElementById('f-addr2').focus();
      checkReady();
    }
  }).open();
}

document.getElementById('btn-place-order').addEventListener('click', function() {
  var name     = document.getElementById('f-name').value.trim();
  var depositor= document.getElementById('f-depositor').value.trim() || name;
  var email    = document.getElementById('f-email').value.trim();
  var phone    = document.getElementById('f-phone').value.trim();
  var addr1    = document.getElementById('f-addr1').value.trim();
  var addr2    = document.getElementById('f-addr2').value.trim();
  var memo     = document.getElementById('f-memo').value.trim();
  var cart     = getCart();

  // validate
  var hasError = false;
  [['f-name','err-name'],['f-email','err-email'],['f-phone','err-phone'],['f-addr1','err-addr']].forEach(function(pair) {
    var val = document.getElementById(pair[0]).value.trim();
    var errEl = document.getElementById(pair[1]);
    if (!val) { errEl.classList.add('visible'); document.getElementById(pair[0]).classList.add('error'); hasError = true; }
    else { errEl.classList.remove('visible'); document.getElementById(pair[0]).classList.remove('error'); }
  });
  if (hasError) return;
  if (cart.length === 0) {
    document.getElementById('err-general').textContent = '장바구니가 비어있습니다.';
    document.getElementById('err-general').classList.add('visible');
    return;
  }

  var sub   = cartSubtotal(cart);
  var ship  = calcShipping(sub, cart);
  var total = sub + ship;
  var orderNum = 'ORD-' + Date.now().toString(36).toUpperCase().slice(-8);
  var itemsStr = cart.map(function(i) { return i.name + ' x' + i.qty; }).join(', ');
  var isRemote = document.getElementById('f-remote').checked;

  var payload = {
    orderNum: orderNum,
    name: name,
    depositor: depositor,
    email: email,
    phone: phone,
    address: (isRemote ? '[도서산간] ' : '') + addr1 + (addr2 ? ' ' + addr2 : ''),
    memo: memo,
    items: itemsStr,
    subtotal: sub,
    shipping: ship,
    total: total,
  };

  // store for confirmation page
  localStorage.setItem('moc_last_order', JSON.stringify(payload));

  var btn = document.getElementById('btn-place-order');
  btn.disabled = true;
  btn.querySelector('.btn-label').textContent = '처리 중...';

  // if Apps Script URL is set, send; otherwise go straight to confirmation
  function goConfirm() {
    localStorage.removeItem('moc_cart');
    location.href = 'confirmation.html';
  }

  if (APPS_SCRIPT_URL) {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
    }).then(goConfirm).catch(function() {
      // even on error, go to confirmation — data is in localStorage
      goConfirm();
    });
  } else {
    goConfirm();
  }
});

renderSummary();

function setOffset() {
  var h = document.getElementById('fixed-top').offsetHeight;
  document.getElementById('main-content').style.paddingTop = (h + 32) + 'px';
}
setOffset();
window.addEventListener('resize', setOffset);
</script>

    <img src="assets/ui/btn-pill.webp" class="btn-bg-img" alt="">
    <span class="btn-label">order</span>

<script>
(function() {
  function getCart() {
    try { return JSON.parse(localStorage.getItem('moc_cart') || '[]'); }
    catch(e) { return []; }
  }
  function saveCart(cart) { localStorage.setItem('moc_cart', JSON.stringify(cart)); }
  function cartCount(cart) { return cart.length; } // number of distinct products, not total quantity
  function cartTotal(cart) { return cart.reduce(function(s,i){ return s+i.price*i.qty; }, 0); }

  function renderCart() {
    var cart = getCart();
    var count = cartCount(cart);
    var fab = document.getElementById('cart-fab');
    var badge = document.getElementById('cart-badge');
    var widget = document.getElementById('cart-widget');
    if (!fab) return;
    badge.textContent = count;
    if (count > 0) { fab.classList.add('visible'); }
    else { fab.classList.remove('visible'); widget.classList.remove('open'); }

    var itemsEl = document.getElementById('cart-items');
    itemsEl.innerHTML = '';
    cart.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML =
        '<img class="cart-item-thumb" src="' + (item.thumb||'') + '" alt="">' +
        '<div class="cart-item-info">' +
          '<div class="cart-item-name">' + item.name + '</div>' +
          '<div class="cart-item-price">₩ ' + item.price.toLocaleString() + '</div>' +
        '</div>' +
        '<div class="cart-item-right">' +
          '<button class="cart-item-remove" data-slug="' + item.slug + '">×</button>' +
          '<div class="cart-mini-stepper">' +
            '<button class="cart-mini-btn" data-slug="' + item.slug + '" data-action="minus">−</button>' +
            '<span>' + item.qty + '</span>' +
            '<button class="cart-mini-btn" data-slug="' + item.slug + '" data-action="plus">+</button>' +
          '</div>' +
        '</div>';
      itemsEl.appendChild(div);
    });
    document.getElementById('cart-subtotal').textContent = '₩ ' + cartTotal(cart).toLocaleString();

    itemsEl.querySelectorAll('.cart-item-remove').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var c = getCart().filter(function(i){ return i.slug !== btn.dataset.slug; });
        saveCart(c); renderCart();
      });
    });
    itemsEl.querySelectorAll('.cart-mini-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var c = getCart();
        var idx = c.findIndex(function(i){ return i.slug === btn.dataset.slug; });
        if (idx === -1) return;
        if (btn.dataset.action === 'plus') { c[idx].qty++; }
        else { c[idx].qty--; if (c[idx].qty <= 0) c.splice(idx, 1); }
        saveCart(c); renderCart();
      });
    });
  }

  var fab = document.getElementById('cart-fab');
  var widget = document.getElementById('cart-widget');
  var closeBtn = document.getElementById('cart-close');
  if (fab) {
    fab.addEventListener('click', function() {
      var isOpen = widget.classList.contains('open');
      widget.classList.toggle('open');
      fab.style.display = isOpen ? '' : 'none';
    });
  }
  if (closeBtn) {
    closeBtn.addEventListener('click', function() {
      widget.classList.remove('open');
      fab.style.display = '';
      renderCart();
    });
  }

  renderCart();
  // expose for product pages to call after add-to-cart
  window.mocRenderCart = renderCart;
  window.mocGetCart = getCart;
  window.mocSaveCart = saveCart;
})();
</script>
